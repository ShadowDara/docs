<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shadowdara's Docs</title><style>:root{--md-font:system-ui,sans-serif;--md-mono:"Fira Code","Cascadia Code",Consolas,monospace;--md-max-width:800px;--md-line-height:1.7;--md-color:#1a1a2e;--md-bg:#fff;--md-code-bg:#f4f4f8;--md-border:#d1d5db;--md-accent:#3b5bdb;--md-blockquote:#6b7280}*,::after,::before{box-sizing:border-box}body{margin:0;background:var(--md-bg);color:var(--md-color)}.md-body{font-family:var(--md-font);line-height:var(--md-line-height);max-width:var(--md-max-width);margin:2rem auto;padding:0 1.5rem}h1,h2,h3,h4,h5,h6{margin:1.6em 0 .4em;line-height:1.25;font-weight:700}h1{font-size:2rem;border-bottom:2px solid var(--md-border);padding-bottom:.3em}h2{font-size:1.5rem;border-bottom:1px solid var(--md-border);padding-bottom:.2em}p{margin:.8em 0}a{color:var(--md-accent)}code{font-family:var(--md-mono);font-size:.875em;background:var(--md-code-bg);padding:.15em .35em;border-radius:4px}pre{background:var(--md-code-bg);border-radius:6px;padding:1em;overflow-x:auto}pre code{background:0 0;padding:0;font-size:.9em}blockquote{margin:1em 0;padding:.5em 1em;border-left:4px solid var(--md-accent);color:var(--md-blockquote)}table{border-collapse:collapse;width:100%;margin:1em 0}td,th{border:1px solid var(--md-border);padding:.5em .8em}th{background:var(--md-code-bg);font-weight:600}tr:nth-child(2n) td{background:#fafafa}ol,ul{padding-left:1.5em;margin:.8em 0}li{margin:.25em 0}hr{border:none;border-top:2px solid var(--md-border);margin:2em 0}img{max-width:100%;height:auto;border-radius:4px}mark{background:#fef08a;padding:.1em .2em;border-radius:2px}input[type=checkbox]{margin-right:.4em}.footnotes{font-size:.875em;color:var(--md-blockquote)}</style></head><body><main id="app" class="md-body"></main><script>const pages={linksaver:'<h1 id="linksaver">Linksaver</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Linksaver is a CLI Tool to save links for credits and licenses for your project.</p><p>The Tool saves your links and configuration in a JSON file called <code>linksaver.json</code>. The Content of this file be viewed via the CLI Tool in the command line or exported to a formatted markdown or txt file.</p><h2 id="setup">Setup</h2><p>Linksaver has no reel setup or installation, just grab the Python file and copy it into your project and run it! Select <code>init</code> to create a new config file for that project. You can find the python script <a href="https://github.com/shadowdara/l2" target="_blank" rel="noopener noreferrer">here</a> and you need to have python installed. Then just start the either via the command line or via a double click, it doesn\'t matter.</p><h2 id="add">add</h2><p>This is the type for most oft the links.</p><h2 id="add2">add2</h2><p>This is the field for the pregenerated copy paste strings you will get from <a href="https://sketchfab.com" target="_blank" rel="noopener noreferrer">sketchfab</a>. I added am extra field to linksaver because, i used a lot of sketchfab 3D Models for my games, and if you are a Game Develeper, you probably too. So this will be really usefull for you!</p><h2 id="add3">add3</h2>',minisite:'<h1 id="minisite">minisite</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Minisite is a small JS Tool to bundle a multi page into one single HTML file. At the moment it is only for markdown, but more is comming in the future.</p><p><em>Fun FACT: This page here was created by minisite</em></p><p><em>EDIT DATE: 10.08.2026</em>#</p>',"path-viewer":'<h1 id="path-viewer">Path Viewer</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>This is programm to see the envirment variables on windows. The GUI is made with ImGUI.</p><p><em>EDIT DATE: 11.08.2026</em></p>',finder:'<h1 id="finder">Finder</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Finder is a small cli written in go to help people find there projects again on their disk.</p><h1 id="installation">Installation</h1><p>Finder is a CLI Tool written in Go and can be installed be running</p><pre><code>go install github.com/shadowdara/finder/cmd/finder@latest</code></pre><p><em>EDIT DATE: 10.07.2026</em></p>',index:'<h1 id="shadowdaras-docs">Shadowdara\'s Docs</h1><p>This is my DOCS Page for all of my small projects and its a test for minisite too! <em>And its a blog about all my projects too, because i try write here a site about everything i have created and will probably create.</em></p><h2 id="content">Content</h2><ul><li><a href="#/finder">Finder</a></li><li><a href="#/linksaver">Linksaver</a></li><li><a href="#/minisite">Minisite</a></li><li><a href="#/path-viewer">Path-Viewer</a></li></ul><h2 id="more-stuff-which-is-not-a-project">More (stuff which is not a project)</h2><ul><li><a href="#/download">Download</a></li><li><a href="#/search">Search</a></li></ul><h2 id="info">Info</h2><p><em>This site is currently under construction</em></p><h2 id="facts">Facts</h2><ul><li><em>This site started on 10.07.2026</em></li></ul><p><em>EDIT DATE: 11.07.2026</em></p>',download:'<h1 id="download">Download</h1><p><a href="#/">Back Home</a> - <a href="#/search">Search</a></p><p>Hey, did you know you can easily download this site as one single HTML file? You can!</p><p>Go <a href="https://github.com/shadowdara/docs/blob/main/docs/index.html" target="_blank" rel="noopener noreferrer">here</a> and download it!</p><p><em>EDIT DATE: 10.07.2026</em></p>'},searchIndex=[];function buildSearchIndex(){for(const[e,a]of Object.entries(pages)){if("404"===e)continue;const n=a.replace(/<script[\s\S]*?<\/script>/gi,"").replace(/<style[\s\S]*?<\/style>/gi,"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/\s+/g," ").toLowerCase(),t=[...new Set(n.match(/\p{L}[\p{L}\p{N}-]*/gu)||[])];searchIndex.push({route:e,text:n,words:t})}}function tokenize(e){return e.toLowerCase().match(/\p{L}[\p{L}\p{N}-]*/gu)||[]}function similarity(e,a){if(!e||!a)return 0;const n=a.split(/\s+/);let t=0;for(const a of n){const n=stringSimilarity(e,a);n>t&&(t=n)}return t}function stringSimilarity(e,a){return 1-levenshtein(e,a)/Math.max(e.length,a.length)}function levenshtein(e,a){const n=[];for(let e=0;e<=a.length;e++)n[e]=[e];for(let a=0;a<=e.length;a++)n[0][a]=a;for(let t=1;t<=a.length;t++)for(let o=1;o<=e.length;o++)a[t-1]==e[o-1]?n[t][o]=n[t-1][o-1]:n[t][o]=Math.min(n[t-1][o-1]+1,n[t][o-1]+1,n[t-1][o]+1);return n[a.length][e.length]}function search(e){const a=tokenize(e),n=[];for(const e of searchIndex){let t=0;for(const n of a){let a=0;for(const t of e.words){const e=stringSimilarity(n,t);e>a&&(a=e)}t+=a}t/=a.length,t>.45&&n.push({route:e.route,score:t})}n.sort((e,a)=>a.score-e.score);const t=document.getElementById("results");t&&(0!==n.length?t.innerHTML=n.map(e=>`\n    <div class="search-result">\n        <a href="#/${e.route}">\n            <strong>${e.route}</strong>\n        </a>\n        <div>${Math.round(100*e.score)}%</div>\n    </div>\n`).join(""):t.innerHTML="<p>no hits found.</p>")}function renderSearch(){app.innerHTML='\n        <h1>Search</h1>\n        \n        <a href="#">Home</a>\n        \n        <br>\n        <br>\n\n        <input\n            id="searchBox"\n            type="search"\n            placeholder="Search..."\n            style="width:100%;padding:10px;font-size:18px">\n\n        <div id="results"></div>\n    ';const e=document.getElementById("searchBox");e.addEventListener("input",()=>{search(e.value)}),e.focus()}buildSearchIndex();const app=document.getElementById("app");function normalizeRoute(e){return""===(e=(e=e.trim()).replace(/^\/+/,""))||"/"===e||"index"===e?"index":e}function render(){let e=location.hash.slice(1);if(e=normalizeRoute(e),"search"===e)return void renderSearch();const a=pages[e]??pages[404]??'<h1>404</h1><p>This Page was not found!</p><p><a href="#">Back Home</a></p><p><a href="javascript:location.hash = \'#/\' + lastValid">Back to the last Page</a></p>';app.innerHTML=a}window.addEventListener("hashchange",render),window.addEventListener("DOMContentLoaded",render)</script></body></html>
