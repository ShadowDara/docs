nsolas,monospace;--md-max-width:800px;--md-line-height:1.7;--md-color:#ffffff;--md-bg:#000000;--md-code-bg:#292929;--md-table-2:#1b1b1b;--md-border:#d1d5db;--md-accent:#45bbff;--md-blockquote:#6b7280}}</style></head><body><main id="app" class="md-body"></main><script>const pages={download:'<h1 id="download">Download</h1><p><a href="#/">Back Home</a> - <a href="#/search">Search</a></p><p>Hey, did you know you can easily download this site as one single HTML file? You can!</p><p>Go <a href="https://github.com/shadowdara/docs/blob/main/docs/index.html" target="_blank" rel="noopener noreferrer">here</a> and download it!</p><p><em>EDIT DATE: 10.07.2026</em></p>',finder:'<h1 id="finder">Finder</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Finder is a small cli written in go to help people find there projects again on their disk.</p><h1 id="installation">Installation</h1><p>Finder is a CLI Tool written in Go and can be installed be running</p><pre><code>go install github.com/shadowdara/finder/cmd/finder@latest</code></pre><p><em>EDIT DATE: 10.07.2026</em></p>',index:'<h1 id="shadowdaras-docs">Shadowdara\'s Docs</h1><p>This is my DOCS Page for all of my small projects and its a test for minisite too! <em>And its a blog about all my projects too, because i try write here a site about everything i have created and will probably create.</em></p><h2 id="content">Content</h2><ul><li><a href="#/finder">Finder</a></li><li><a href="#/linksaver">Linksaver</a></li><li><a href="#/minisite">Minisite</a></li><li><a href="#/path-viewer">Path-Viewer</a></li><li><a href="#/samfile">samfile</a></li><li><a href="#/templates">templates</a></li></ul><h2 id="more-stuff-which-is-not-a-project">More (stuff which is not a project)</h2><ul><li><a href="#/download">Download</a></li><li><a href="#/search">Search</a></li><li><a href="#/todo">TODO</a></li></ul><h2 id="info">Info</h2><p><em>This site is currently under construction</em></p><h2 id="facts">Facts</h2><ul><li><em>This site started on 10.07.2026</em></li></ul><p><em>EDIT DATE: 12.07.2026</em></p>',linksaver:'<h1 id="linksaver">Linksaver</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Linksaver is a CLI Tool to save links for credits and licenses for your project.</p><p>The Tool saves your links and configuration in a JSON file called <code>linksaver.json</code>. The Content of this file be viewed via the CLI Tool in the command line or exported to a formatted markdown or txt file.</p><h2 id="setup">Setup</h2><p>Linksaver has no reel setup or installation, just grab the Python file and copy it into your project and run it! Select <code>init</code> to create a new config file for that project. You can find the python script <a href="https://github.com/shadowdara/l2" target="_blank" rel="noopener noreferrer">here</a> and you need to have python installed. Then just start the either via the command line or via a double click, it doesn\'t matter.</p><h2 id="add">add</h2><p>This is the type for most oft the links.</p><h2 id="add2">add2</h2><p>This is the field for the pregenerated copy paste strings you will get from <a href="https://sketchfab.com" target="_blank" rel="noopener noreferrer">sketchfab</a>. I added am extra field to linksaver because, i used a lot of sketchfab 3D Models for my games, and if you are a Game Develeper, you probably too. So this will be really usefull for you!</p><h2 id="add3">add3</h2>',minisite:'<h1 id="minisite">minisite</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Minisite is a small JS Tool to bundle a multi page into one single HTML file. At the moment it is only for markdown, but more is comming in the future.</p><p><em>Fun FACT: This page here was created by minisite</em></p><p><em>EDIT DATE: 10.08.2026</em>#</p>',"path-viewer":'<h1 id="path-viewer">Path Viewer</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>This is programm to see the envirment variables on windows. The GUI is made with ImGUI.</p><p><em>EDIT DATE: 11.08.2026</em></p>',samfile:'<h1 id="samfile">samfile</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>samfile is custom make inspired file by me (Shadowdara).</p><h2 id="copy-paste-samfile">copy paste samfile</h2><pre><code># Lines starting with # are comments\n// This is a comment too\n-- and this too\n\nbuild:\n    ECHO Running the build\n    RUN bun run build\n</code></pre><h2 id="commands">Commands</h2><p>The samfile has a lot of commands which are available. Click <a href="#/samfile/commands">here</a> to view a full list for every command.</p><h2 id="runners">Runners</h2><p>This is an overview about the samfile runners and which commands they are supporting</p><p><em>View the statistic <a href="#/samfile/runners">here</a></em></p><h3 id="download">Download</h3><h3 id="ideas-todo">Ideas / TODO</h3><ul><li>move samfile to the root dir instead of <code>.samengine</code> but both will work, but the .samengine directory will probably generated an info message that this is not neccessary anymore, but the support for it will not be removed!</li><li>Add new field for a timer which be started and then stopped and printed to the command line</li><li><em>(I planning to make it slowly to an mix between shell and make)</em></li></ul><p><em>EDIT DATE: 11.07.2026</em></p>',"samfile/commands":'<h1 id="samfile-commands">samfile commands</h1><p><a href="#/samfile">Go Back</a></p><p>Here is a full command list for samfiles</p><table><thead><tr><th style="text-align:left">Command</th><th style="text-align:left">Explanation</th></tr></thead><tbody><tr><td style="text-align:left">CD</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">CDWIN</td><td style="text-align:left">✔</td></tr><tr><td style="t
