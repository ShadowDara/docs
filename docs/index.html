<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shadowdara's Docs</title><style>:root{--md-font:system-ui,sans-serif;--md-mono:"Fira Code","Cascadia Code",Consolas,monospace;--md-max-width:800px;--md-line-height:1.7;--md-color:#1a1a2e;--md-bg:#ffffff;--md-code-bg:#f4f4f8;--md-table-2:#fafafa;--md-border:#d1d5db;--md-accent:#3b5bdb;--md-blockquote:#6b7280}*,::after,::before{box-sizing:border-box}body{margin:0;background:var(--md-bg);color:var(--md-color)}.md-body{font-family:var(--md-font);line-height:var(--md-line-height);max-width:var(--md-max-width);margin:2rem auto;padding:0 1.5rem}h1,h2,h3,h4,h5,h6{margin:1.6em 0 .4em;line-height:1.25;font-weight:700}h1{font-size:2rem;border-bottom:2px solid var(--md-border);padding-bottom:.3em}h2{font-size:1.5rem;border-bottom:1px solid var(--md-border);padding-bottom:.2em}p{margin:.8em 0}a{color:var(--md-accent)}code{font-family:var(--md-mono);font-size:.875em;background:var(--md-code-bg);padding:.15em .35em;border-radius:4px}pre{background:var(--md-code-bg);border-radius:6px;padding:1em;overflow-x:auto}pre code{background:0 0;padding:0;font-size:.9em}blockquote{margin:1em 0;padding:.5em 1em;border-left:4px solid var(--md-accent);color:var(--md-blockquote)}input{color:var(--md-color);background:var(--md-bg)}table{border-collapse:collapse;width:100%;margin:1em 0}td,th{border:1px solid var(--md-border);padding:.5em .8em}th{background:var(--md-code-bg);font-weight:600}tr:nth-child(2n) td{background:var(--md-table-2)}ol,ul{padding-left:1.5em;margin:.8em 0}li{margin:.25em 0}hr{border:none;border-top:2px solid var(--md-border);margin:2em 0}img{max-width:100%;height:auto;border-radius:4px}mark{background:#fef08a;padding:.1em .2em;border-radius:2px}input[type=checkbox]{margin-right:.4em}.footnotes{font-size:.875em;color:var(--md-blockquote)}@media (prefers-color-scheme:dark){:root{--md-font:system-ui,sans-serif;--md-mono:"Fira Code","Cascadia Code",Consolas,monospace;--md-max-width:800px;--md-line-height:1.7;--md-color:#ffffff;--md-bg:#000000;--md-code-bg:#292929;--md-table-2:#1b1b1b;--md-border:#d1d5db;--md-accent:#45bbff;--md-blockquote:#6b7280}}</style></head><body><main id="app" class="md-body"></main><script>const pages={"cpplibs/ansicolors":'<h1 id="ansicolors">Ansicolors</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>This page moved <a href="#/libs/cpp/ansicolors">here</a>!</p><p><em>EDIT DATE: 19.07.2026</em></p>',download:'<h1 id="download">Download</h1><p><a href="#/">Back Home</a> - <a href="#/search">Search</a></p><p>Hey, did you know you can easily download this site as one single HTML file? You can!</p><p>Go <a href="https://github.com/shadowdara/docs/blob/main/docs/index.html" target="_blank" rel="noopener noreferrer">here</a> and download it!</p><p>Or here the download link:</p><pre><code>https://raw.githubusercontent.com/shadowdara/docs/refs/heads/main/docs/index.html</code></pre><p><em>EDIT DATE: 13.07.2026</em></p>',finder:'<h1 id="finder">Finder</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Finder is a small cli written in go to help people find there projects again on their disk.</p><h1 id="installation">Installation</h1><p>Finder is a CLI Tool written in Go and can be installed be running</p><pre><code>go install github.com/shadowdara/finder/cmd/finder@latest</code></pre><p><em>EDIT DATE: 10.07.2026</em></p>',index:'<h1 id="shadowdaras-docs">Shadowdara\'s Docs</h1><p>This is my DOCS Page for all of my small projects and its a test for minisite too! <em>And its a blog about all my projects too, because i try write here a site about everything i have created and will probably create.</em></p><h2 id="content-i-am-really-proud-of">Content i am really proud of</h2><table><thead><tr><th style="text-align:left">Name</th><th style="text-align:left">Description</th></tr></thead><tbody><tr><td style="text-align:left"><a href="#/finder">Finder</a></td><td style="text-align:left">a cli tool in Go which helps to find projects on your disk by their folder structure</td></tr><tr><td style="text-align:left"><a href="#/linksaver">Linksaver</a></td><td style="text-align:left">a python cli tool save links for your project and generate a license file from it</td></tr><tr><td style="text-align:left"><a href="#/minisite">Minisite</a></td><td style="text-align:left">a JS tool which can multi page markdown sites in one HTML file</td></tr><tr><td style="text-align:left"><a href="#/path-viewer">Path-Viewer</a></td><td style="text-align:left">a windows programm to view and edit the path variables written in C++</td></tr><tr><td style="text-align:left"><a href="#/samfile">samfile</a></td><td style="text-align:left">a makefile clone which a lot better ;)</td></tr><tr><td style="text-align:left"><a href="#/templates">templates</a></td><td style="text-align:left">some templates for C++ projects which are already linked</td></tr><tr><td style="text-align:left"><a href="#/libs/cpp">C++ libs</a></td><td style="text-align:left">some libs which i made in C++</td></tr></tbody></table><h2 id="content">Content</h2><ul><li>seg</li><li>samengin</li><li>fling</li></ul><h2 id="simple-c-libs">simple C++ Libs</h2><ul><li>Colors</li><li>Version</li><li>Logger</li></ul><h2 id="more-stuff-which-is-not-a-project">More (stuff which is not a project)</h2><ul><li><a href="#/download">Download</a></li><li><a href="#/search">Search</a></li><li><a href="#/todo">TODO</a></li><li><a href="#/online">Online Pages</a></li></ul><h2 id="info">Info</h2><p><em>This site is currently under construction</em></p><h2 id="facts">Facts</h2><ul><li><em>This site started on 10.07.2026</em></li></ul><p><em>EDIT DATE: 19.07.2026</em></p>',"libs/cpp":'<h1 id="c-libs">C++ Libs</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><ul><li><a href="#/libs/cpp/ansicolors">Ansicolors</a></li></ul><p><em>EDIT DATE: 19.07.2026</em></p>',"libs/cpp/ansicolors":'<h1 id="ansicolors">Ansicolors</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>This is a tiny header only lib for C++ and C which add every ansi color as a macro. Just copy the header file to your project.</p><p>If you are using raylib add this macro because otherwise the macros will be overwriteen by raylib.</p><pre><code class="language-c++">#define RM_ANSI_FROM_COLORNAME 1\n</code></pre><p>You can use it as a const too by defining:</p><pre><code class="language-c++">#define USE_COLORS_AS_MACRO 1</code></pre><p>The repo can be found <a href="https://github.com/ShadowDara/colors-cpp" target="_blank" rel="noopener noreferrer">here</a>.</p><p><em>EDIT DATE: 19.07.2026</em></p>',linksaver:'<h1 id="linksaver-l2">Linksaver (<code>l2</code>)</h1><h2 id="link-and-dependency-documentation-tool">Link and Dependency Documentation Tool</h2><p><strong>Linksaver</strong> is a CLI tool for saving, organizing and documenting links, licenses, dependencies and external resources used by software projects.</p><p>The command line executable is called:</p><pre><code class="language-bash">l2</code></pre><p>Linksaver creates a structured <code>linksaver.json</code> file and can generate human-readable documentation files in Markdown and TXT format.</p><hr><h1 id="features">Features</h1><p>Linksaver helps developers to keep track of:</p><ul><li>Project links</li><li>External resources</li><li>Authors and licenses</li><li>License files</li><li>Package dependencies</li><li>Cargo dependencies</li><li>Git submodules</li><li>Change notices</li><li>Project documentation</li></ul><p>Generated documentation can be used for:</p><ul><li>Open source projects</li><li>License compliance</li><li>Credits pages</li><li>Documentation websites</li><li>Dependency reports</li></ul><hr><h1 id="installation">Installation</h1><h2 id="from-source">From source</h2><p>Clone the repository:</p><pre><code class="language-bash">git clone https://github.com/ShadowDara/linksaver2</code></pre><p>Run:</p><pre><code class="language-bash">python linksaver.py</code></pre><p>To install the CLI command:</p><pre><code class="language-bash">pip install .</code></pre><p>After installation:</p><pre><code class="language-bash">l2 help</code></pre><p>should work globally.</p><hr><h1 id="quick-start">Quick Start</h1><p>Initialize Linksaver inside your project:</p><pre><code class="language-bash">l2 init</code></pre><p>Example:</p><pre><code>Init Linksaver\n\nProjectname: MyProject\n\nCreated config at linksaver.json</code></pre><p>This creates:</p><pre><code>your-project/\n│\n├── linksaver.json\n└── .samengine/\n    ├── links.info.md\n    └── links.info.txt</code></pre><hr><h1 id="commands">Commands</h1><h2 id="help">Help</h2><p>Show all available commands:</p><pre><code class="language-bash">l2 help</code></pre><p>Output:</p><pre><code>help\ninit\nadd\nadd2\nadd3\nview\nviewx\nlist\naddpkg\naddcargo\nopen\naddsubmodule\nclonesubm</code></pre><hr><h1 id="project-initialization">Project Initialization</h1><h2 id="init"><code>init</code></h2><p>Creates a new Linksaver configuration.</p><p>Usage:</p><pre><code class="language-bash">l2 init</code></pre><p>Creates:</p><pre><code class="language-json">{\n    &quot;projectname&quot;: &quot;Example&quot;,\n    &quot;links&quot;: []\n}</code></pre><hr><h1 id="adding-links">Adding Links</h1><h2 id="add"><code>add</code></h2><p>Adds a normal link entry.</p><p>Usage:</p><pre><code class="language-bash">l2 add</code></pre><p>Example:</p><pre><code>Name (optional): wxWidgets\nAuthor (optional): wxWidgets Team\nLicense (optional): LGPL\nLicense Link: https://www.wxwidgets.org/about/licence/\n\nNew Link:\nhttps://github.com/wxWidgets/wxWidgets\n\nNew Description:\nCross-platform GUI library</code></pre><p>Result:</p><pre><code class="language-json">{\n    &quot;name&quot;: &quot;wxWidgets&quot;,\n    &quot;link&quot;: &quot;https://github.com/wxWidgets/wxWidgets&quot;,\n    &quot;description&quot;: &quot;Cross-platform GUI library&quot;,\n    &quot;license&quot;: &quot;LGPL&quot;\n}</code></pre><hr><h1 id="adding-text-entries">Adding Text Entries</h1><h2 id="add2"><code>add2</code></h2><p>Adds a simple text entry.</p><p>Usage:</p><pre><code class="language-bash">l2 add2</code></pre><p>Example:</p><pre><code>Entry text:\nUses SDL2 for rendering</code></pre><hr><h1 id="adding-license-files">Adding License Files</h1><h2 id="add3"><code>add3</code></h2><p>Adds a license file reference.</p><p>Usage:</p><pre><code class="language-bash">l2 add3</code></pre><p>Example:</p><pre><code>License file:\nthirdparty/library/LICENSE</code></pre><p>During Markdown/TXT generation the file content is included.</p><hr><h1 id="generate-documentation">Generate Documentation</h1><h2 id="markdown-output">Markdown output</h2><p>Command:</p><pre><code class="language-bash">l2 view</code></pre><p>Creates:</p><pre><code>.samengine/links.md</code></pre><p>Example output:</p><pre><code class="language-markdown"># Links for MyProject\n\nUsed for MyProject:\n\n- **wxWidgets**\n  (https://github.com/wxWidgets/wxWidgets)\n  - Cross platform GUI library\n  - licensed under LGPL</code></pre><hr><h2 id="txt-output">TXT output</h2><p>Command:</p><pre><code class="language-bash">l2 viewx</code></pre><p>Creates:</p><pre><code>.samengine/links.txt</code></pre><p>Useful for:</p><ul><li>Plain text credits</li><li>License archives</li><li>Automated processing</li></ul><hr><h1 id="listing-credits">Listing Credits</h1><h2 id="list"><code>list</code></h2><p>Displays saved links directly in the terminal.</p><p>Usage:</p><pre><code class="language-bash">l2 list</code></pre><p>Example:</p><pre><code>&quot;wxWidgets&quot;\nhttps://github.com/wxWidgets/wxWidgets\n\nby wxWidgets Team\n\nlicensed under LGPL</code></pre><hr><h1 id="opening-links">Opening Links</h1><h2 id="open"><code>open</code></h2><p>Opens all saved links in the default browser.</p><p>Usage:</p><pre><code class="language-bash">l2 open</code></pre><p>Supported systems:</p><ul><li>Windows</li><li>Linux</li><li>macOS</li></ul><hr><h1 id="package-lock-support">Package Lock Support</h1><h2 id="import-npm-dependencies">Import npm dependencies</h2><p>Command:</p><pre><code class="language-bash">l2 addpkg</code></pre><p>Reads:</p><pre><code>package-lock.json</code></pre><p>and extracts:</p><ul><li>Package name</li><li>Version</li><li>License</li><li>npm link</li><li>Date</li></ul><p>Example:</p><pre><code class="language-json">{\n    &quot;name&quot;: &quot;react&quot;,\n    &quot;version&quot;: &quot;18.0.0&quot;,\n    &quot;license&quot;: &quot;MIT&quot;\n}</code></pre><p>Requires:</p><pre><code>node_modules/\npackage-lock.json</code></pre><hr><h1 id="cargo-support">Cargo Support</h1><h2 id="import-rust-dependencies">Import Rust dependencies</h2><p>Command:</p><pre><code class="language-bash">l2 addcargo</code></pre><p>Reads:</p><pre><code>Cargo.lock</code></pre><p>and searches:</p><pre><code>~/.cargo/registry/src</code></pre><p>Extracts:</p><ul><li>Crate name</li><li>Version</li><li>License</li><li>crates.io URL</li></ul><p>Example:</p><pre><code class="language-json">{\n    &quot;name&quot;: &quot;serde&quot;,\n    &quot;version&quot;: &quot;1.0&quot;,\n    &quot;license&quot;: &quot;MIT OR Apache-2.0&quot;\n}</code></pre><p>Requires:</p><pre><code class="language-bash">cargo fetch</code></pre><hr><h1 id="git-submodules">Git Submodules</h1><p>Linksaver can save and clone external Git repositories.</p><h2 id="add-a-submodule-entry">Add a submodule entry</h2><p>Command:</p><pre><code class="language-bash">l2 addsubmodule</code></pre><p>Example:</p><pre><code>Description:\nwxWidgets source\n\nDirectory:\nthirdparty\n\nClone directory:\nwxWidgets\n\nRepository:\nhttps://github.com/wxWidgets/wxWidgets\n\nCommit:\n670835aec7e54b9e9d5a50d6a1aea1e8ba0bcdb2</code></pre><p>Stored as:</p><pre><code class="language-json">{\n    &quot;git&quot;: {\n        &quot;submodules&quot;: [\n            {\n                &quot;desc&quot;: &quot;wxWidgets source&quot;,\n                &quot;dir&quot;: &quot;thirdparty&quot;,\n                &quot;clonedir&quot;: &quot;wxWidgets&quot;,\n                &quot;repolink&quot;: &quot;...&quot;,\n                &quot;repocommit&quot;: &quot;...&quot;\n            }\n        ]\n    }\n}</code></pre><hr><h2 id="clone-submodules">Clone submodules</h2><p>Command:</p><pre><code class="language-bash">l2 clonesubm</code></pre><p>Linksaver will:</p><ol><li>Create the target directory</li><li>Clone the repository</li><li>Checkout the requested commit</li><li>Initialize Git submodules</li></ol><p>Example:</p><pre><code>Cloning dependencies\n\nwxWidgets source\n\nCloned wxWidgets successfully!\n\nFinished cloning every submodule!</code></pre><hr><h1 id="configuration-file">Configuration File</h1><p>The main configuration file:</p><pre><code>linksaver.json</code></pre><p>Example:</p><pre><code class="language-json">{\n    &quot;projectname&quot;: &quot;MyProject&quot;,\n\n    &quot;pretty&quot;: true,\n\n    &quot;links&quot;: [],\n\n    &quot;links2&quot;: [],\n\n    &quot;links3&quot;: [],\n\n    &quot;links4&quot;: [],\n\n    &quot;links5&quot;: [],\n\n    &quot;linkspkglock&quot;: [],\n\n    &quot;linkscargolock&quot;: [],\n\n    &quot;settings&quot;: {\n        &quot;selectmenu&quot;: false\n    },\n\n    &quot;git&quot;: {\n        &quot;submodules&quot;: []\n    }\n}</code></pre><hr><h1 id="interactive-menu">Interactive Menu</h1><p>Linksaver also supports a menu mode.</p><p>Enable:</p><pre><code class="language-json">{\n    &quot;settings&quot;: {\n        &quot;selectmenu&quot;: true\n    }\n}</code></pre><p>Run:</p><pre><code class="language-bash">l2</code></pre><p>Example:</p><pre><code>=== Linksaver ===\n\n1. Open all links\n2. Init\n3. Add link\n4. Add text entry\n5. Add license file\n6. Generate Markdown\n7. Generate TXT\n8. List credits\n9. Import package-lock.json\n10. Import Cargo.lock\n11. Help\n12. Add Git Submodule\n13. Clone git submodules\n14. Exit</code></pre><hr><h1 id="generated-files">Generated Files</h1><p>After using <code>view</code>:</p><pre><code>.samengine/\n│\n├── links.md\n├── links.txt\n├── links.info.md\n└── links.info.txt</code></pre><hr><h1 id="supported-platforms">Supported Platforms</h1><p>Linksaver supports:</p><ul><li>Windows</li><li>Linux</li><li>macOS</li></ul><hr><h1 id="development">Development</h1><p>Written in:</p><pre><code>Python</code></pre><p>Main technologies:</p><ul><li>Dataclasses</li><li>JSON serialization</li><li>pathlib</li><li>subprocess</li><li>Git integration</li></ul><hr><h1 id="license">License</h1><p>Linksaver is licensed under:</p><pre><code>Apache License 2.0</code></pre><p>Copyright:</p><pre><code>ShadowDara 2026</code></pre><p>Do not remove the license notice from the source code.</p><hr><h1 id="author">Author</h1><p>Created by:</p><p><strong>ShadowDara</strong></p><p>Project documentation:</p><pre><code>https://shadowdara.github.io/docs/#/linksaver</code></pre><hr><h1 id="version">Version</h1><p>Current version:</p><pre><code>3.0.0</code></pre><p><em>EDIT DATE: 12.07.2026</em></p>',minisite:'<h1 id="minisite">minisite</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>Minisite is a small JS Tool to bundle a multi page into one single HTML file. At the moment it is only for markdown, but more is comming in the future.</p><p><em>Fun FACT: This page here was created by minisite</em></p><p><em>EDIT DATE: 14.08.2026</em></p>',online:'<h1 id="online-pages">Online Pages</h1><p>This a list of the online pages for the DOCS</p><h2 id="list">List</h2><ul><li><a href="./staticpages/buildinsamfiles.html">buildinsamfiles</a></li></ul><p><em>EDIT DATE: 14.07.2026</em></p>',"path-viewer":'<h1 id="path-viewer">Path Viewer</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>This is programm to see the envirment variables on windows. The GUI is made with ImGUI.</p><p>THe programm does only work on Windows. The code can be found <a href="https://github.com/shadowdara/path-viewer" target="_blank" rel="noopener noreferrer">here</a>.</p><p><em>EDIT DATE: 13.08.2026</em></p>',samfile:'<h1 id="samfile">samfile</h1><p><a href="#">Back Home</a> - <a href="#/download">Download Page</a> - <a href="#/search">Search</a></p><p>samfile is custom make inspired file by me (Shadowdara).</p><h2 id="copy-paste-samfile">copy paste samfile</h2><pre><code># Lines starting with # are comments\n// This is a comment too\n-- and this too\n\nbuild:\n    ECHO Running the build\n    RUN bun run build\n</code></pre><h2 id="task-naming">Task Naming</h2><p>i would recommend the users to make task which does not start with <code><em></em></code> in general and no especially not with <code>b</code>. The good thing you will see, every Task name. But i just want to recommend it.</p><h2 id="commands">Commands</h2><p>The samfile has a lot of commands which are available. Click <a href="#/samfile/commands">here</a> to view a full list for every command.</p><h2 id="install">Install</h2><p>Simply install the samfilerunner with and then run it via <code>seg</code>!</p><h3 id="cargo">cargo</h3><pre><code>cargo install samtool</code></pre><h3 id="npm">npm</h3><pre><code>npm i @shadowdara/seg</code></pre><h2 id="runners">Runners</h2><p>This is an overview about the samfile runners and which commands they are supporting</p><p><em>View the statistic <a href="#/samfile/runners">here</a></em></p><h2 id="buildin-samfile">Buildin samfile</h2><p>The buildin samfile can be found <a href="./staticpages/buildinsamfiles.html">here</a></p><h2 id="ideas-todo">Ideas / TODO</h2><ul><li>move samfile to the root dir instead of <code>.samengine</code> but both will work, but the .samengine directory will probably generated an info message that this is not neccessary anymore, but the support for it will not be removed!</li><li>Add new field for a timer which be started and then stopped and printed to the command line</li><li><em>(I planning to make it slowly to an mix between shell and make)</em></li></ul><p><em>EDIT DATE: 14.07.2026</em></p>',"samfile/commands":'<h1 id="samfile-commands">samfile commands</h1><p><a href="#/samfile">Go Back</a></p><p>Here is a full command list for samfiles</p><table><thead><tr><th style="text-align:left">Command</th><th style="text-align:left">Explanation</th></tr></thead><tbody><tr><td style="text-align:left">CD</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">CDWIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">CDMAC</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">CDLIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">ENV</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">ENVWIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">ENVMAC</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">ENVLIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RUN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RUNWIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RUNMAC</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RUNLIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">TASK</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">TASKWIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">TASKMAC</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">TASKLIN</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RM</td><td style="text-align:left">✔</td></tr><tr><td style="text-align:left">RMWIN</td><td style="text-a
